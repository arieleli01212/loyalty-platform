# Render Blueprint — describes the services needed to deploy this app.
# Render reads this file when you create a "New Blueprint" pointing at the repo.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: loyalty-platform
    env: docker
    plan: free
    # Build the Docker image from the root Dockerfile (multi-stage: React + FastAPI).
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Strong random SECRET_KEY generated by Render — not stored anywhere else.
      - key: SECRET_KEY
        generateValue: true

      # You'll fill DATABASE_URL in the Render dashboard after creating the
      # Neon Postgres database. Format:
      #   postgresql+asyncpg://<user>:<pass>@<host>/<db>?ssl=require
      - key: DATABASE_URL
        sync: false

      # The public URL of this Render service. After the first deploy, edit
      # this to the actual `*.onrender.com` URL (or your custom domain).
      - key: BASE_URL
        sync: false

      # JSON array (single-quoted in the dashboard) of origins allowed to call
      # the API from a browser. Since the frontend is same-origin in this
      # setup, this only matters if you ever serve the dashboard from a
      # different domain. Example: ["https://loyalty.example.com"]
      - key: CORS_ORIGINS
        value: '[]'

      # Optional tunables — defaults are fine for now.
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: STAMP_THROTTLE_MINUTES
        value: "2"
      - key: WALLET_PROVIDER
        value: stub
